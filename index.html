<html>
<head>
<meta charset="utf-8">
<title>붐이 홈피</title>
<style>
body {
    margin: 0;
    background: #fff;
    font-family: dotum;
    color: #222;
}
.wrap {
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
}
.title {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    color: #111;
}
.main-img {
    width: 100%;
    max-width: 1080px;
    height: auto;
    display: block;
    background: #f0f0f0;
    min-height: 200px;
}
.guestbook {
    width: 100%;
    max-width: 1080px;
    background: #f9f9f9;
    border-top: 2px solid #222;
    padding: 15px;
    box-sizing: border-box;
}
.guestbook input {
    background: #fff;
    border: 1px solid #ccc;
    color: #222;
    padding: 6px;
    font-size: 12px;
}
.guestbook button {
    background: #111;
    border: none;
    padding: 6px 12px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
}
.entry {
    margin: 10px 0;
    padding: 8px 10px;
    background: rgba(255,255,255,0.7);
    border-left: 3px solid #333;
    border-radius: 6px;
    color: #333;
    transition: 0.2s;
    backdrop-filter: blur(4px);
}
.entry:hover {
    transform: translateX(3px);
    background: rgba(240,240,240,0.85);
}
.name {
    color: #111;
    font-weight: bold;
}
hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 10px 0;
}

/* BGM 바 — 반투명 화이트 앤 블랙 */
.bgm-bar {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.12);
    border-top: 1px solid rgba(255,255,255,0.9);
    padding: 8px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #222;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.bgm-bar span {
    color: #444;
    letter-spacing: 0.03em;
}
.bgm-bar button {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.2);
    color: #111;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 20px;
    font-weight: bold;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
}
.bgm-bar button:hover {
    background: #111;
    color: #fff;
    border-color: #111;
}
input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: rgba(0,0,0,0.15);
    border: none;
    border-radius: 3px;
    outline: none;
    padding: 0;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #111;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>
<body>

<audio id="bgm" src="https://nlvkfrekpundyinhgtzo.supabase.co/storage/v1/object/public/bgm/For%20U.mp3" loop preload="auto"></audio>

<div class="wrap">
    <div class="title">
        붐이 홈피
    </div>

    <div class="bgm-bar">
        <span style="filter: brightness(0);">🎵</span><span> BGM</span>
        <button id="playBtn" onclick="toggleBGM()">▶ 재생</button>
        <span>볼륨</span>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5"
               oninput="document.getElementById('bgm').volume = this.value">
    </div>

    <img class="main-img" src="https://i.imgur.com/e6etkb1.gif" loading="lazy" decoding="async">

    <div class="guestbook">
        <div style="color:#111; font-weight:bold;">
            방명록 남기고 가기
        </div>
        <br>
        <input id="msg" placeholder="메시지">
        <button onclick="addMessage()">등록하기</button>
        <hr>
        <div id="guestbook"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const bgm = document.getElementById("bgm");
bgm.volume = 0.5;

// 페이지 로드 시 자동재생 시도
bgm.play().then(() => {
    document.getElementById("playBtn").textContent = "⏸ 정지";
}).catch(() => {
    // 브라우저가 막으면 첫 클릭 때 재생
    const autoPlay = () => {
        bgm.play().then(() => {
            document.getElementById("playBtn").textContent = "⏸ 정지";
        });
        document.removeEventListener("click", autoPlay);
    };
    document.addEventListener("click", autoPlay);
});

function toggleBGM() {
    const btn = document.getElementById("playBtn");
    if (bgm.paused) {
        bgm.play().then(() => {
            btn.textContent = "⏸ 정지";
        }).catch(e => {
            console.log("재생 실패:", e);
            alert("재생 실패: " + e.message);
        });
    } else {
        bgm.pause();
        btn.textContent = "▶ 재생";
    }
}

const supabaseUrl = "https://nlvkfrekpundyinhgtzo.supabase.co";
const supabaseKey = "sb_publishable_DQs8rT0Ff8WbemjjVSuV7w_DavNXXO3";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

async function addMessage() {
    const msg = document.getElementById("msg").value;
    if (!msg) return;
    const { error } = await client
        .from("guestbook")
        .insert([{
            nickname: "익명",
            message: msg
        }]);
    if (error) {
        console.log(error);
        alert("등록 실패");
        return;
    }
    document.getElementById("nickname").value = "";
    document.getElementById("msg").value = "";
    loadMessages();
}

async function loadMessages() {
    const { data } = await client
        .from("guestbook")
        .select("*")
        .order("id", { ascending: false });
    const box = document.getElementById("guestbook");
    box.innerHTML = "";
    data.forEach(row => {
        const div = document.createElement("div");
        div.className = "entry";
        div.innerHTML =
            `<span class="name">${row.nickname || "익명"}</span> : ${row.message}`;
        box.appendChild(div);
    });
}
loadMessages();
</script>
</body>
</html>
